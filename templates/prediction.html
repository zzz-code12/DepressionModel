<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction — Depression Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <h1 class="main-header"><span>Depression</span> Dashboard</h1>

    <div class="layout">
        <nav class="sidebar">
            <ul>
                <li><a href="{{ url_for('home') }}">
                    <img src="{{ url_for('static', filename='images/home.png') }}" alt="Home" class="icon">
                    <span class="text">Home</span>
                </a></li>
                <li><a href="{{ url_for('prediction') }}" class="active">
                    <img src="{{ url_for('static', filename='images/prediction.png') }}" alt="Prediction" class="icon">
                    <span class="text">Prediction</span>
                </a></li>
                <li><a href="{{ url_for('result') }}">
                    <img src="{{ url_for('static', filename='images/results.png') }}" alt="Results" class="icon">
                    <span class="text">Results</span>
                </a></li>
                <li><a href="{{ url_for('about') }}">
                    <img src="{{ url_for('static', filename='images/about.png') }}" alt="About" class="icon">
                    <span class="text">About</span>
                </a></li>
            </ul>
        </nav>

        <main>
            <div class="hero" style="margin-bottom: 32px;">
                <span class="tag">Step 1 of 1</span>
                <h2 class="page-title">Depression Prediction<br><em>Form</em></h2>
                <p class="page-subtitle">Answer honestly for the most accurate result. All fields are required.</p>
            </div>

            <form action="/predict" method="POST">

                <!-- Section: Personal -->
                <div style="margin-bottom: 8px; padding: 0 0 12px 0; border-bottom: 1px solid var(--border);">
                    <p style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); font-weight: 600;">Personal</p>
                </div>

                <div class="form-grid" style="margin-bottom: 28px;">
                    <div class="form-group">
                        <label>Gender</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="1" required> <span>Male</span></label>
                            <label><input type="radio" name="gender" value="0"> <span>Female</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Education Level</label>
                        <select name="degree" required>
                            <option value="">Select level</option>
                            <option value="1">Undergraduate</option>
                            <option value="2">Postgraduate</option>
                            <option value="3">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Family History of Mental Illness</label>
                        <div class="radio-group">
                            <label><input type="radio" name="family_history" value="1" required> <span>Yes</span></label>
                            <label><input type="radio" name="family_history" value="0"> <span>No</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Suicidal Thoughts (ever)</label>
                        <div class="radio-group">
                            <label><input type="radio" name="suicidal_thoughts" value="1" required> <span>Yes</span></label>
                            <label><input type="radio" name="suicidal_thoughts" value="0"> <span>No</span></label>
                        </div>
                    </div>
                </div>

                <!-- Section: Academic -->
                <div style="margin-bottom: 8px; padding: 0 0 12px 0; border-bottom: 1px solid var(--border);">
                    <p style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); font-weight: 600;">Academic</p>
                </div>

                <div class="form-grid" style="margin-bottom: 28px;">
                    <div class="form-group">
                        <label>Academic Pressure <small style="color:var(--text-faint)">(1 = Low, 5 = High)</small></label>
                        <input type="number" name="academic_pressure" min="1" max="5" placeholder="1–5" required>
                    </div>
                    <div class="form-group">
                        <label>CGPA <small style="color:var(--text-faint)">(0.0 – 10.0)</small></label>
                        <input type="number" name="cgpa" min="0" max="10" step="0.01" placeholder="e.g. 7.5" required>
                    </div>
                    <div class="form-group">
                        <label>Study Satisfaction <small style="color:var(--text-faint)">(1 = Low, 5 = High)</small></label>
                        <input type="number" name="study_satisfaction" min="1" max="5" placeholder="1–5" required>
                    </div>
                    <div class="form-group">
                        <label>Work / Study Hours per Day</label>
                        <input type="number" name="work_study_hours" min="0" max="12" placeholder="0–12 hrs" required>
                    </div>
                </div>

                <!-- Section: Lifestyle -->
                <div style="margin-bottom: 8px; padding: 0 0 12px 0; border-bottom: 1px solid var(--border);">
                    <p style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); font-weight: 600;">Lifestyle & Wellbeing</p>
                </div>

                <div class="form-grid" style="margin-bottom: 12px;">
                    <div class="form-group">
                        <label>Sleep Duration</label>
                        <select name="sleep_duration" required>
                            <option value="">Select duration</option>
                            <option value="1">Less than 5 hours</option>
                            <option value="2">5–6 hours</option>
                            <option value="3">7–8 hours</option>
                            <option value="4">More than 8 hours</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Dietary Habits</label>
                        <select name="dietary_habits" required>
                            <option value="">Select habits</option>
                            <option value="1">Unhealthy</option>
                            <option value="2">Moderate</option>
                            <option value="3">Healthy</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Financial Stress <small style="color:var(--text-faint)">(1 = Low, 5 = High)</small></label>
                        <input type="number" name="financial_stress" min="1" max="5" placeholder="1–5" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Run Prediction →</button>
            </form>
        </main>
    </div>
</body>
</html>
